# Sous-Bot Configuration
# API keys should be set in .env, not here

planner:
  provider: "nebius"
  model: "meta-llama/Llama-3.3-70B-Instruct-fast"
  temperature: 0.3
  max_tokens: 4096
  nebius_base_url: "https://api.tokenfactory.nebius.com/v1/"

vision:
  camera_index: 0
  detection_confidence_threshold: 0.7
  model: "Qwen/Qwen2.5-VL-72B-Instruct"

robotics:
  adapter: "simulation"  # "simulation" or "real"
  action_timeout_seconds: 30

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
